<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamline Prompter</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="styles.css">
</head>

<body>
    <div id="app">
        <!-- EDIT MODE -->
        <section id="edit-view" class="view active">
            <header class="glass-header">
                <div>
                    <h1>Streamline<span class="accent-text">Prompter</span></h1>
                    <p class="subtitle">Write or paste your script below.</p>
                </div>
                <div class="header-actions">
                    <button class="btn primary-btn" id="start-prompter-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        Start Prompter
                    </button>
                    <button class="btn secondary-btn" id="new-prompter-btn-edit">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 6h18"></path>
                            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                        </svg>
                        Clear
                    </button>
                </div>
            </header>

            <main class="editor-container glass-panel">
                <textarea id="script-input" placeholder="Start typing your script here..."></textarea>
            </main>
        </section>

        <!-- PLAY MODE -->
        <section id="play-view" class="view">
            <!-- Teleprompter Display -->
            <div id="prompter-display-container">
                <div class="eye-line-marker">
                    <div class="marker-line left"></div>
                    <div class="marker-text">READ HERE</div>
                    <div class="marker-line right"></div>
                </div>
                <!-- Add margin to the top and bottom so text can scroll fully from bottom to top -->
                <div id="prompter-text-wrapper" class="prompter-text-wrapper">
                    <div id="prompter-text" class="prompter-content"></div>
                </div>
            </div>

            <!-- Floating Controls Panel -->
            <div class="glass-panel floating-controls" id="play-controls">

                <div class="control-group">
                    <button class="icon-btn action-btn pulse-anim" id="play-pause-btn" aria-label="Play/Pause">
                        <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                            viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        <svg id="icon-pause" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24"
                            height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                            stroke-linecap="round" stroke-linejoin="round">
                            <rect x="6" y="4" width="4" height="16"></rect>
                            <rect x="14" y="4" width="4" height="16"></rect>
                        </svg>
                    </button>
                </div>

                <div class="control-separator"></div>

                <div class="control-group sliders-group">
                    <div class="slider-container">
                        <label for="speed-slider" title="Scroll Speed">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <circle cx="12" cy="12" r="10" />
                                <polyline points="12 6 12 12 16 14" />
                            </svg>
                        </label>
                        <input type="range" id="speed-slider" min="1" max="100" value="30">
                    </div>

                    <div class="slider-container">
                        <label for="size-slider" title="Font Size">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                fill="none" stroke="currentColor" stroke-width="2">
                                <path d="M4 19V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14" />
                                <path d="M12 12h.01" />
                                <path d="M8 12h.01" />
                                <path d="M16 12h.01" />
                            </svg>
                        </label>
                        <input type="range" id="size-slider" min="20" max="150" value="64">
                    </div>
                </div>

                <div class="control-separator"></div>

                <div class="control-group toggle-group">
                    <button class="btn secondary-btn small-btn" id="voice-btn" title="Voice Scroll">
                        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="22"></line>
                        </svg>
                        Voice
                    </button>
                    <button class="btn secondary-btn small-btn" id="mirror-btn" title="Mirror Text">Mirror</button>
                </div>

                <div class="control-separator"></div>

                <div class="control-group secondary-actions">
                    <button class="btn secondary-btn danger-hover" id="edit-btn">Edit Script</button>
                </div>
            </div>
        </section>
    </div>

    <!-- Main JS -->
    <script src="app.js"></script>
</body>

</html>
