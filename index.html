<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Streamline Prompter</title>
    <!-- Favicon -->
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🎙️</text></svg>">
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&family=Outfit:wght@300;400;600;700&display=swap"
        rel="stylesheet">
    <!-- Main CSS -->
    <link rel="stylesheet" href="styles.css?v=1.53">
</head>

<body>
    <div id="app">
        <!-- EDIT MODE -->
        <section id="edit-view" class="view active">
            <header class="glass-header">
                <div>
                    <h1>Streamline<span class="accent-text">Prompter</span></h1>
                    <p class="subtitle">Write or paste your script below.</p>
                </div>
                <div class="header-actions">
                    <button type="button" class="btn secondary-btn" id="load-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path>
                            <polyline points="7 10 12 15 17 10"></polyline>
                            <line x1="12" y1="15" x2="12" y2="3"></line>
                        </svg>
                        Load
                    </button>
                    <input type="file" id="load-file-input" accept=".txt" style="display: none;">
                    
                    <button type="button" class="btn secondary-btn" id="save-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2z"></path>
                            <polyline points="17 21 17 13 7 13 7 21"></polyline>
                            <polyline points="7 3 7 8 15 8"></polyline>
                        </svg>
                        Save
                    </button>
                    <button class="btn primary-btn" id="start-prompter-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <polygon points="5 3 19 12 5 21 5 3"></polygon>
                        </svg>
                        Start Prompter
                    </button>
                    <button type="button" class="btn secondary-btn" id="dictate-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                            <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                            <line x1="12" y1="19" x2="12" y2="22"></line>
                        </svg>
                        Dictate
                    </button>
                    <button class="btn secondary-btn" id="new-prompter-btn-edit">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M3 6h18"></path>
                            <path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"></path>
                            <path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"></path>
                        </svg>
                        Clear
                    </button>
                    <button type="button" class="btn secondary-btn" id="library-btn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1-2.5-2.5Z"></path>
                            <path d="M8 2v20"></path>
                        </svg>
                        Library
                    </button>
                    <button type="button" class="btn secondary-btn" id="toggle-settings-btn" title="Settings">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none"
                            stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                            <circle cx="12" cy="12" r="3"></circle>
                            <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                        </svg>
                        Settings
                    </button>
                </div>
            </header>
            
            <section id="settings-panel" class="settings-bar" style="display: none;">
                <div class="settings-group">
                    <span class="settings-label">Theme</span>
                    <select id="theme-select" class="select-pill">
                        <option value="midnight">Midnight (Dark)</option>
                        <option value="paper">Paper (Light)</option>
                        <option value="classic">Classic (Retro)</option>
                    </select>
                </div>
                <div class="settings-group">
                    <span class="settings-label">Font</span>
                    <select id="font-select" class="select-pill">
                        <option value="font-sans">Modern Sans</option>
                        <option value="font-serif">Formal Serif</option>
                        <option value="font-mono">Technical Mono</option>
                    </select>
                </div>
                <div class="settings-divider"></div>
                <div class="settings-full-group">
                    <span class="settings-label">Keyboard Shortcuts</span>
                    <div class="hotkey-list">
                        <div class="hotkey-row">
                            <span>Play / Pause</span>
                            <button type="button" class="hotkey-btn" data-action="togglePlay">Space</button>
                        </div>
                        <div class="hotkey-row">
                            <span>Speed Up</span>
                            <button type="button" class="hotkey-btn" data-action="speedUp">ArrowRight</button>
                        </div>
                        <div class="hotkey-row">
                            <span>Slow Down</span>
                            <button type="button" class="hotkey-btn" data-action="speedDown">ArrowLeft</button>
                        </div>
                        <div class="hotkey-row">
                            <span>Reset / Edit</span>
                            <button type="button" class="hotkey-btn" data-action="edit">Escape</button>
                        </div>
                    </div>
                </div>
            </section>

            <main class="editor-container glass-panel" style="position: relative;">
                <div class="editor-toolbar">
                    <button type="button" class="tool-btn" data-command="bold" title="Bold (Cmd+B)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M6 4h8a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path><path d="M6 12h9a4 4 0 0 1 4 4 4 4 0 0 1-4 4H6z"></path></svg>
                    </button>
                    <button type="button" class="tool-btn" data-command="italic" title="Italic (Cmd+I)">
                        <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><line x1="19" y1="4" x2="10" y2="4"></line><line x1="14" y1="20" x2="5" y2="20"></line><line x1="15" y1="4" x2="9" y2="20"></line></svg>
                    </button>
                    <div class="tool-separator"></div>
                    <button type="button" class="tool-btn color-btn" data-color="var(--accent-color)" title="Default Color" style="color: var(--accent-color)">A</button>
                    <button type="button" class="tool-btn color-btn" data-color="#ef4444" title="Red" style="color: #ef4444">A</button>
                    <button type="button" class="tool-btn color-btn" data-color="#22c55e" title="Green" style="color: #22c55e">A</button>
                    <button type="button" class="tool-btn color-btn" data-color="#eab308" title="Yellow" style="color: #eab308">A</button>
                </div>
                <div id="dictation-indicator" class="dictation-indicator">
                    <span class="blinking-cursor"></span> Listening...
                </div>
                <div class="editor-stats-overlay">
                    <span id="editor-word-count">0 words</span>
                    <span class="stat-sep">•</span>
                    <span id="editor-time-estimate">0:00 est.</span>
                </div>
                <div id="script-input" class="rich-editor" contenteditable="true" placeholder="Start typing or pasting your script here..."></div>
            </main>
        </section>

        <!-- PLAY MODE -->
        <section id="play-view" class="view">
            <!-- Stats Bar -->
            <div class="stats-bar" id="stats-bar">
                <div class="stat-item">
                    <span class="stat-label">WPM</span>
                    <span class="stat-value" id="stat-wpm">150</span>
                </div>
                <div class="stat-separator"></div>
                <div class="stat-item">
                    <span class="stat-label" id="time-total-label">DURATION</span>
                    <span class="stat-value" id="stat-total-time">0:00</span>
                </div>
                <div class="stat-separator"></div>
                <div class="stat-item">
                    <span class="stat-label">REMAINING</span>
                    <span class="stat-value" id="stat-remaining-time">0:00</span>
                </div>
            </div>

            <!-- Teleprompter Display -->
            <div id="prompter-display-container">
                <div id="eye-line-marker" class="eye-line-marker">
                    <div class="marker-line left"></div>
                    <div class="marker-text">READ HERE</div>
                    <div class="marker-line right"></div>
                </div>
                <!-- Add margin to the top and bottom so text can scroll fully from bottom to top -->
                <div id="prompter-text-wrapper" class="prompter-text-wrapper">
                    <div id="prompter-text" class="prompter-content"></div>
                </div>
            </div>

            <!-- Floating Controls Panel -->
            <div class="glass-panel floating-controls" id="play-controls">
                <div class="scrubber-container">
                    <input type="range" id="script-scrubber" min="0" max="100" value="0" step="0.1">
                </div>

                <div class="controls-row">
                    <div class="control-group">
                        <button class="icon-btn action-btn pulse-anim" id="play-pause-btn" aria-label="Play/Pause">
                            <svg id="icon-play" xmlns="http://www.w3.org/2000/svg" width="24" height="24"
                                viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <polygon points="5 3 19 12 5 21 5 3"></polygon>
                            </svg>
                            <svg id="icon-pause" style="display: none;" xmlns="http://www.w3.org/2000/svg" width="24"
                                height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"
                                stroke-linecap="round" stroke-linejoin="round">
                                <rect x="6" y="4" width="4" height="16"></rect>
                                <rect x="14" y="4" width="4" height="16"></rect>
                            </svg>
                        </button>
                    </div>

                    <div class="control-separator"></div>

                    <div class="control-group sliders-group">
                        <div class="slider-container">
                            <label for="speed-slider" title="Scroll Speed">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <circle cx="12" cy="12" r="10" />
                                    <polyline points="12 6 12 12 16 14" />
                                </svg>
                            </label>
                            <input type="range" id="speed-slider" min="1" max="100" value="30">
                        </div>

                        <div class="slider-container">
                            <label for="size-slider" title="Font Size">
                                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24"
                                    fill="none" stroke="currentColor" stroke-width="2">
                                    <path d="M4 19V5a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v14" />
                                    <path d="M12 12h.01" />
                                    <path d="M8 12h.01" />
                                    <path d="M16 12h.01" />
                                </svg>
                            </label>
                            <input type="range" id="size-slider" min="20" max="150" value="64">
                        </div>
                    </div>

                    <div class="control-separator"></div>

                    <div class="control-group toggle-group">
                        <button class="btn secondary-btn small-btn" id="voice-btn" title="Voice Scroll">
                            <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"></path>
                                <path d="M19 10v2a7 7 0 0 1-14 0v-2"></path>
                                <line x1="12" y1="19" x2="12" y2="22"></line>
                            </svg>
                            Voice
                        </button>
                        <button class="btn secondary-btn small-btn" id="mirror-btn" title="Mirror Text">Mirror</button>
                    </div>

                    <div class="control-separator"></div>

                    <div class="control-group">
                        <button type="button" class="btn icon-btn secondary-btn small-btn" id="toggle-settings-play" title="Visual Styles">
                            <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none"
                                stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                                <circle cx="12" cy="12" r="3"></circle>
                                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
                            </svg>
                        </button>
                        <div id="play-settings-panel" style="display: none; gap: 0.5rem; align-items: center;">
                            <select id="theme-select-play" class="select-pill small-select">
                                <option value="midnight">Midnight</option>
                                <option value="paper">Paper</option>
                                <option value="classic">Classic</option>
                            </select>
                            <select id="font-select-play" class="select-pill small-select">
                                <option value="font-sans">Sans</option>
                                <option value="font-serif">Serif</option>
                                <option value="font-mono">Mono</option>
                            </select>
                        </div>
                    </div>

                    <div class="control-separator"></div>

                    <div class="control-group secondary-actions">
                        <button class="btn secondary-btn danger-hover" id="edit-btn">Edit Script</button>
                    </div>
                </div>
            </div>
        </section>
    </div>

    <!-- LIBRARY SIDEBAR -->
    <aside id="library-sidebar" class="sidebar">
        <div class="sidebar-header">
            <h2>Script Library</h2>
            <button id="close-library-btn" class="icon-btn">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="6" x2="6" y2="18"></line><line x1="6" y1="6" x2="18" y2="18"></line></svg>
            </button>
        </div>
        <div class="sidebar-content">
            <div id="library-list" class="library-list">
                <!-- Library items will be injected here -->
                <p class="empty-state">No saved scripts yet.</p>
            </div>
        </div>
    </aside>
    <div id="sidebar-overlay" class="sidebar-overlay"></div>

    <!-- Main JS -->
    <script src="app.js?v=1.40"></script>
</body>

</html>
